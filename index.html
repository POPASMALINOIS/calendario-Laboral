<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Calendario Laboral</title>

  <!-- Diseño actualizado -->
  <link rel="stylesheet" href="styles.css?v=7" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Calendario Laboral" />
</head>
<body>

  <header>
    <h1>Calendario Laboral</h1>
    <p id="yearLabel"></p>
  </header>

  <!-- Navegación -->
  <nav>
    <button type="button" onclick="showTab('calendario')">Calendario</button>
    <button type="button" onclick="showTab('contadores')">Contadores</button>
    <button type="button" onclick="showTab('permisos')">Permisos</button>
  </nav>

  <main>

    <!-- CALENDARIO -->
    <section id="calendario" class="tab active">
      <div class="selector">
        <label for="categorySelect">Categoría</label>
        <select id="categorySelect"></select>
      </div>

      <div id="calendarGrid"></div>
    </section>

    <!-- CONTADORES -->
    <section id="contadores" class="tab">
      <h2>Contadores de permisos</h2>
      <div id="counterList"></div>
      <button type="button" onclick="saveCounters()">Guardar contadores</button>
    </section>

    <!-- PERMISOS -->
    <section id="permisos" class="tab">
      <h2>Gestión de permisos</h2>
      <div id="historyList"></div>

      <button type="button" onclick="exportData()">Exportar datos</button>
      <button type="button" class="danger" onclick="clearAll()">Borrar todo</button>
    </section>

  </main>

  <!-- JS -->
  <script src="app.js?v=7"></script>

</body>
</html>
